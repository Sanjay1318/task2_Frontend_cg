<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link rel="stylesheet" href="./external_new.css">
</head>
<body class="login">
    <div class="container">
        <h2>User Login</h2>
        <form action="#" method="post" onsubmit="handleLogin(event)">
            <label for="username">Enter Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            <br>
            <label for="password">Enter Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            
            <button type="submit" class="btn-grad">Login</button>
        </form>
        <p style="text-align:center; margin-top: 10px;">Don't have an account? <a href="registration.html">Register here</a></p>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            window.location.href = "registration.html";
        }
    </script>
</body>
</html>
